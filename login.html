<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Login - Mi Cevillar</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container { max-width:420px; margin:6rem auto; padding:2rem; background:var(--card-bg); border-radius:10px; box-shadow:var(--shadow); }
        .login-container h2{ color:var(--primary-color); margin-bottom:1rem }
        .login-form { display:flex; flex-direction:column; gap:1rem }
        .login-form input, .login-form select { padding:12px; border-radius:8px; border:1px solid var(--border-color); }
        .login-actions { display:flex; gap:10px }
    </style>
</head>
<body>
    <main class="container">
        <div class="login-container">
            <h2>Acceder a Mi Cevillar</h2>
            <form id="loginForm" class="login-form">
                <label>Usuario</label>
                <input id="username" placeholder="ej. j.martinez" required>
                <label>Correo</label>
                <input id="email" type="email" placeholder="ej. juan@cevillar.edu.hn" required>
                <label>Rol</label>
                <select id="roleSelect">
                    <option value="student">Estudiante</option>
                    <option value="admin">Administrador</option>
                </select>
                <div class="login-actions">
                    <button class="btn-primary" type="submit">Iniciar Sesión</button>
                    <button class="btn-secondary" id="demoBtn" type="button">Demo Rápido</button>
                </div>
            </form>
            <p style="margin-top:1rem;color:var(--text-light)">Esta es una autenticación simulada para pruebas. No use credenciales reales.</p>
        </div>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e){
            e.preventDefault();
            const user = document.getElementById('username').value.trim() || 'usuario';
            const email = document.getElementById('email').value.trim() || 'user@local';
            const role = document.getElementById('roleSelect').value || 'student';
            const profile = {
                name: user.split('.')[0] ? user.replace('.', ' ') : user,
                username: user,
                email,
                role
            };
            localStorage.setItem('miCevillar_user', JSON.stringify(profile));
            window.location.href = 'index.html';
        });

        document.getElementById('demoBtn').addEventListener('click', function(){
            const demo = { name: 'Demo Usuario', username: 'demo.user', email: 'demo@cevillar.edu.hn', role: 'student' };
            localStorage.setItem('miCevillar_user', JSON.stringify(demo));
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
